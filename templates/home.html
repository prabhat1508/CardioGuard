<!-- templates/home.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Predictive Pulse - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- animation library -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>

        body{
            background: linear-gradient(135deg, rgba(0,0,0,0.65), rgba(0,0,0,0.35)),
                        url("{{ url_for('static', filename='bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            color:white;
        }

        .main{
            text-align:center;
            margin-top:80px;
            background-color:rgba(0,0,0,0.6);
            padding:40px;
            border-radius:15px;
        }

        .btn{
            padding:12px 25px;
            font-size:18px;
            width:250px;
        }

        .btn-space{
            margin-top:15px;
        }

        .btn-back {
            font-size: 1.4rem;
            font-weight: 900;
            padding: 0.35rem 0.75rem;
        }

        .animation{
            display:flex;
            justify-content:center;
            margin-bottom:20px;
        }

    </style>
</head>

<body>

<div class="container main">

    <div class="animation">

        <!-- Doctor animation -->
        <lottie-player 
        src="https://assets10.lottiefiles.com/packages/lf20_jcikwtux.json"
        background="transparent"
        speed="1"
        style="width:250px;height:250px;"
        loop
        autoplay>
        </lottie-player>

    </div>

    <h1 class="mb-3">🩺 Predictive Pulse</h1>

    <p class="lead">Harnessing Machine Learning for Health Analysis</p>

    <!-- BP Button -->
    <a href="/predict-page" class="btn btn-light btn-space">
        Check Your BP Stage
    </a>

    <br>

    <!-- Sugar Button -->
    <a href="/sugar-page" class="btn btn-warning btn-space">
        Check Your Sugar
    </a>

    <br>
<br>
    <a href="/records" class="btn btn-dark">
View Patient Records
</a>
<br>

    <!-- Doctor Consultation -->
    <a href="/doctor-page" class="btn btn-success btn-space">
        Consult a Doctor
    </a>

</div>

</body>
</html>
