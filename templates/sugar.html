<!DOCTYPE html>

<html>
<head>

<title>Sugar Level Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  background: linear-gradient(135deg, rgba(0,0,0,0.65), rgba(0,0,0,0.35)),
              url("{{ url_for('static', filename='bg.jpg') }}");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family:Segoe UI;
}

.btn-back {
  font-size: 1.4rem;
  font-weight: 900;
  padding: 0.35rem 0.75rem;
}

.container{
max-width:700px;
margin-top:80px;
}

</style>

</head>

<body>

<div class="container">

<div class="card p-4">

<div class="d-flex align-items-center justify-content-center mb-3 position-relative">
  <a href="/" class="btn btn-outline-secondary btn-back position-absolute start-0">←</a>
  <h3 class="text-center mb-0">🍬 Sugar Risk Checker</h3>
</div>

<form action="/predict-sugar" method="POST">

<div class="mb-3">
<label>Name</label>
<input type="text" name="Name" class="form-control" required>
</div>

<div class="mb-3">
<label>Glucose Level</label>
<input type="number" name="Glucose" class="form-control" required>
</div>

<div class="mb-3">
<label>BMI</label>
<input type="number" step="0.1" name="BMI" class="form-control" required>
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" name="Age" class="form-control" required>
</div>

<button class="btn btn-primary w-100">
Check Sugar Risk
</button>

</form>

{% if prediction_text %}

<div class="alert alert-success text-center mt-4">

{{ prediction_text }}

<br>

<b>{{ advice }}</b>

</div>

<div class="text-center">

<button onclick="downloadPDF()" class="btn btn-outline-primary">
Download Report
</button>

</div>

{% endif %}

</div>

<script>
function generatePDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const today = new Date().toLocaleString();

/* BLUE BACKGROUND */
doc.setFillColor(0,102,204);
doc.rect(0,0,210,297,"F");

/* WHITE TEXT */
doc.setTextColor(255,255,255);

doc.setFontSize(22);
doc.text("SUGAR RISK REPORT",20,20);

doc.setFontSize(12);

doc.text("Name: {{ name }}",20,40);
doc.text("Date: "+today,20,50);

doc.text("Systolic BP: {{ systolic }}",20,70);
doc.text("Diastolic BP: {{ diastolic }}",20,80);

doc.text("Result: {{ prediction_text }}",20,100);
doc.text("Advice: {{ advice }}",20,110);

/* DIET CHART */

doc.setFontSize(16);
doc.text("Diet Chart",20,140);

doc.setFontSize(12);
doc.text("- Morning: Fruits + Oats",20,150);
doc.text("- Lunch: Dal + Roti + Vegetables",20,160);
doc.text("- Evening: Nuts / Sprouts",20,170);
doc.text("- Dinner: Salad + Light Food",20,180);

/* MEDICINE */

doc.setFontSize(16);
doc.text("Medicine",20,200);

doc.setFontSize(12);
doc.text("- Consult doctor before medicine",20,210);
doc.text("- BP medicine example: Amlodipine",20,220);

/* EXERCISE */

doc.setFontSize(16);
doc.text("Exercise Plan",20,240);

doc.setFontSize(12);
doc.text("- 30 minutes walking daily",20,250);
doc.text("- Light yoga / breathing exercise",20,260);

doc.save("sugar_report");

}
</script>
<script>
  var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
  var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
    return new bootstrap.Tooltip(tooltipTriggerEl)
  })
  
</script>

</body>

</html>
